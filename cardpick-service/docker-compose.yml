services:
  postgres:
    image: postgres:16-alpine
    container_name: cardpick-postgres
    environment:
      POSTGRES_DB: cardpick
      POSTGRES_USER: cardpick
      POSTGRES_PASSWORD: cardpick
    ports:
      - "8091:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cardpick"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cardpick-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:
